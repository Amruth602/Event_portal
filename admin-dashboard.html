<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body onload="loadAdminDashboard()">
  <div class="dashboard">
    <aside class="sidebar">
      <h2>Admin Panel</h2>
      <a href="admin-dashboard.html">Dashboard</a>
      <a href="events.html">Public Events</a>
      <button onclick="logout()">Logout</button>
    </aside>

    <main class="main-content">
      <div class="topbar">
        <h2>Admin Dashboard</h2>
      </div>

      <div id="adminMsg"></div>

      <div id="stats" class="stats"></div>

      <section class="dashboard-section">
        <h3>Manage Events</h3>
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>Title</th>
                <th>Date</th>
                <th>Venue</th>
                <th>Seats</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="eventsTable"></tbody>
          </table>
        </div>
      </section>

      <section class="dashboard-section">
        <h3>All Registrations</h3>
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Phone</th>
                <th>College</th>
                <th>Event</th>
              </tr>
            </thead>
            <tbody id="registrationsTable"></tbody>
          </table>
        </div>
      </section>

      <section class="dashboard-section">
        <h3>All Users</h3>
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Role</th>
                <th>Joined</th>
              </tr>
            </thead>
            <tbody id="usersTable"></tbody>
          </table>
        </div>
      </section>

      <section class="dashboard-section">
        <h3>Vendor Locations</h3>
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>Vendor</th>
                <th>Location</th>
                <th>Address</th>
                <th>Capacity</th>
                <th>Status</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="locationsTable"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
