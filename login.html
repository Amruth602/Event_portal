<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Event Registration Portal</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="form-wrapper">
    <div class="form-card">
      <h2 class="form-title">Login</h2>
      <p class="form-subtitle">Login as admin, vendor, or user</p>

      <div id="msg"></div>

      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="input-group">
          <label>Email</label>
          <input type="email" id="email" required />
        </div>

        <div class="input-group">
          <label>Password</label>
          <input type="password" id="password" required />
        </div>

        <button type="submit" class="btn btn-primary">Login</button>
      </form>

      <div style="margin-top:20px; padding:12px; background:#eef2ff; border-radius:12px;">
        <strong>Default Admin Login</strong><br />
        Email: admin@university.com<br />
        Password: admin123
      </div>

      <p style="margin-top: 16px;">
        Don't have an account?
        <a href="register.html" style="color:#4f46e5;">Register here</a>
      </p>

      <p style="margin-top: 8px;">
        <a href="index.html" style="color:#4f46e5;">Back to Home</a>
      </p>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
